<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>手势识别 + TTS Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      text-align: center;
      margin: 0;
      padding: 20px;
    }
    h1 {
      margin-bottom: 10px;
    }
    .wrap {
      display: inline-block;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }
    video {
      width: 640px;
      max-width: 95vw;
      border-radius: 10px;
      background: black;
    }
    #result {
      margin-top: 16px;
      font-size: 28px;
      font-weight: bold;
      color: #222;
    }
    #status {
      margin-top: 8px;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>手势识别 + TTS Demo</h1>
  <div class="wrap">
    <video id="video" autoplay playsinline muted></video>
    <div id="result">等待识别...</div>
    <div id="status">正在初始化摄像头与手部检测...</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <script>
    const videoElement = document.getElementById("video");
    const resultEl = document.getElementById("result");
    const statusEl = document.getElementById("status");

    let lastSendTime = 0;
    let lastSpokenText = "";
    let lastSpeakTime = 0;

    const SEND_INTERVAL = 400;
    const SPEAK_COOLDOWN = 2000;

    function speakText(text) {
      if (!text || text === "未识别" || text === "未检测到手") return;

      const now = Date.now();
      if (text === lastSpokenText && now - lastSpeakTime < SPEAK_COOLDOWN) {
        return;
      }

      window.speechSynthesis.cancel();

      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = "zh-CN";
      utter.rate = 1.0;
      utter.pitch = 1.0;
      utter.volume = 1.0;

      window.speechSynthesis.speak(utter);

      lastSpokenText = text;
      lastSpeakTime = now;
    }

    async function sendToBackend(landmarks) {
      try {
        const resp = await fetch("/predict", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ landmarks })
        });
        const data = await resp.json();
        const text = data.text || "未识别";

        resultEl.textContent = text;
        speakText(text);
      } catch (err) {
        console.error(err);
        statusEl.textContent = "后端请求失败，请检查服务是否启动";
      }
    }

    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.7
    });

    hands.onResults((results) => {
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const hand = results.multiHandLandmarks[0];
        const landmarks = hand.map(p => ({
          x: p.x,
          y: p.y,
          z: p.z || 0
        }));

        const now = Date.now();
        if (now - lastSendTime > SEND_INTERVAL) {
          lastSendTime = now;
          sendToBackend(landmarks);
        }

        statusEl.textContent = "检测到手部，正在识别...";
      } else {
        resultEl.textContent = "未检测到手";
        statusEl.textContent = "请将手放到摄像头前";
      }
    });

    async function initCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 640, height: 480 },
          audio: false
        });
        videoElement.srcObject = stream;

        const camera = new Camera(videoElement, {
          onFrame: async () => {
            await hands.send({ image: videoElement });
          },
          width: 640,
          height: 480
        });

        camera.start();
        statusEl.textContent = "摄像头已启动";
      } catch (err) {
        console.error(err);
        statusEl.textContent = "无法打开摄像头，请检查浏览器权限";
      }
    }

    initCamera();
  </script>
</body>
</html>
