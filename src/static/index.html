<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gesture Word Input</title>

<style>
body{
    font-family: Arial;
    text-align:center;
}

video{
    width:640px;
    border:2px solid black;
}

#panel{
    margin-top:20px;
    font-size:22px;
}

.row{
    margin:8px;
}

.locked{
    color:red;
    font-weight:bold;
}
</style>

</head>

<body>

<h2>Gesture Word Input Demo</h2>

<video id="video" autoplay playsinline></video>

<div id="panel">

<div class="row">Gesture: <span id="gesture">-</span></div>

<div class="row">Code: <span id="code">-</span></div>

<div class="row">Text: <span id="label">-</span></div>

<div class="row">State: <span id="state">idle</span></div>

<div class="row">Locked: <span id="locked">false</span></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>

const video = document.getElementById("video")

const gestureText = document.getElementById("gesture")
const codeText = document.getElementById("code")
const labelText = document.getElementById("label")
const stateText = document.getElementById("state")
const lockedText = document.getElementById("locked")


const canvas = document.createElement("canvas")
const ctx = canvas.getContext("2d")
document.body.appendChild(canvas)


async function sendLandmarks(landmarks){

    const payload = {
        landmarks: landmarks.map(p=>({
            x:p.x,
            y:p.y,
            z:p.z
        }))
    }

    try{

        const res = await fetch("/predict",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(payload)
        })

        const data = await res.json()

        updateUI(data)

    }catch(err){
        console.error(err)
    }

}


function updateUI(data){

    gestureText.innerText = data.gesture ?? "-"
    codeText.innerText = data.code ?? "-"
    labelText.innerText = data.label ?? "-"

    stateText.innerText = data.state
    lockedText.innerText = data.locked

    if(data.locked){
        lockedText.classList.add("locked")
    }else{
        lockedText.classList.remove("locked")
    }

    if(data.label){
        speak(data.label)
    }

}


function speak(text){

    if(!text) return

    const msg = new SpeechSynthesisUtterance(text)

    msg.lang="zh-CN"

    speechSynthesis.speak(msg)

}



const hands = new Hands({
    locateFile:(file)=>{
        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    }
})

hands.setOptions({
    maxNumHands:1,
    modelComplexity:1,
    minDetectionConfidence:0.7,
    minTrackingConfidence:0.7
})


hands.onResults((results)=>{

    canvas.width = video.videoWidth
    canvas.height = video.videoHeight

    ctx.drawImage(results.image,0,0,canvas.width,canvas.height)

    if(results.multiHandLandmarks){

        for(const landmarks of results.multiHandLandmarks){

            drawConnectors(ctx,landmarks,HAND_CONNECTIONS)
            drawLandmarks(ctx,landmarks)

            sendLandmarks(landmarks)
        }
    }

})


const camera = new Camera(video,{
    onFrame: async ()=>{
        await hands.send({image:video})
    },
    width:640,
    height:480
})

camera.start()

</script>

</body>
</html>
